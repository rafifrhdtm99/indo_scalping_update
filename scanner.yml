name: Auto-Scanner IHSG Alert

on:
  schedule:
    # Berjalan setiap 5 menit pada jam kerja IHSG (Senin - Jumat)
    # Jam IHSG: 09:00 - 16:00 WIB (Sesi 1 & 2). WIB = UTC+7.
    # Waktu UTC: 02:00 - 09:00 UTC.
    # Cron format: '*/5 2-8 * * 1-5'
    - cron: '*/5 2-8 * * 1-5'
  workflow_dispatch: # Memungkinkan tombol manual "Run workflow" di GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Background Scanner
        run: python cron_scanner.py

      - name: Commit and Push updated History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_history.json
          git commit -m "Auto-update signal history [skip ci]" || echo "No changes to commit"
          git push
